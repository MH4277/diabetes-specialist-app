<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>糖尿病内科 専門医更新データシート</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#18212f;--muted:#667085;--line:#d9dee8;--accent:#2563eb;--soft:#eaf1ff;--danger:#dc2626;--ok:#059669}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:white;padding:24px 28px}h1{margin:0;font-size:24px}.sub{opacity:.9;margin-top:6px}
main{padding:22px;max-width:1320px;margin:auto}.grid{display:grid;grid-template-columns:430px 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(16,24,40,.06)}
h2{font-size:18px;margin:0 0 14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:11px}label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;background:white}textarea{min-height:80px;resize:vertical}.calc{background:var(--soft);border-radius:12px;padding:12px;margin:10px 0;font-weight:700}.calc span{display:block;font-size:13px;color:var(--muted);font-weight:500;margin-top:3px}
button{border:0;border-radius:10px;padding:10px 13px;font-weight:700;cursor:pointer;background:var(--accent);color:white}.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.secondary{background:#475569}.ghost{background:#eef2f7;color:#263244}.danger{background:var(--danger)}.ok{background:var(--ok)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.toolbar input,.toolbar select{max-width:220px}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;background:white;min-width:1050px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:13px;white-space:nowrap}th{background:#f1f5f9;color:#475569;position:sticky;top:0}tr:hover{background:#f8fafc}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#e2e8f0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px}.stat b{font-size:24px}.small{font-size:12px;color:var(--muted)}
@media(max-width:980px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
.vascular-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.vascular-card {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 80px;
  padding: 12px 12px 12px 16px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  cursor: pointer;
  transition: 0.2s;
}

.vascular-card:hover {
  border-color: var(--accent);
  background: var(--soft);
}

.vascular-card input {
  position: absolute;
  left: 14px;
  top: 50%;
  width: 20px;
  height: 20px;
  transform: translateY(-50%);
  accent-color: var(--accent);
}

.vascular-card span {
    display:block;
    font-size:15px;
    font-weight:700;
    margin-left:28px;
}

.vascular-card small {
    display:block;
    font-size:12px;
    color:#6b7280;
    margin-left:28px;
    margin-top:3px;
}
.vascular-card:has(input:checked) {
  border-color: var(--accent);
  background: var(--soft);
  box-shadow: 0 0 0 1px var(--accent);
}

@media (max-width: 560px) {
.vascular-options{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:8px;
}

.vascular-card{
    min-height:70px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
</style>
</head>
<body>
<header><h1>糖尿病内科 専門医更新データシート</h1><div class="sub">患者登録・BMI/CPI自動計算・一覧検索・CSV出力・ローカル保存</div></header>
<main class="grid">
<section class="card">
<h2 id="formTitle">患者登録</h2>
<input type="hidden" id="editIndex">
<div class="row"><div class="field"><label>患者ID</label><input id="patientId" placeholder="例：DM-0001"></div><div class="field"><label>性別</label><select id="sex"><option value="">選択</option><option>男性</option><option>女性</option><option>その他/不明</option></select></div></div>
<div class="row"><div class="field"><label>身長 cm</label><input id="height" type="number" step="0.1"></div><div class="field"><label>体重 kg</label><input id="weight" type="number" step="0.1"></div></div>
<div class="calc">BMI: <span id="bmiView">未計算</span></div>
<div class="field"><label>糖尿病病型</label><select id="dmType"><option value="">選択</option><option>1型</option><option>2型</option><option>その他</option></select></div>
<div class="row"><div class="field"><label>sCPR ng/mL</label><input id="scpr" type="number" step="0.01"></div><div class="field"><label>空腹時血糖 mg/dL</label><input id="fpg" type="number" step="1"></div></div>
<div class="calc">CPI: <span id="cpiView">未計算</span><span>CPI = sCPR × 100 / 空腹時血糖</span></div>
<div class="field"><label>網膜症</label><select id="retinopathy"><option value="">選択</option><option>なし</option><option>単純</option><option>増殖前</option><option>増殖</option><option>凝固後</option></select></div>
<div class="row">
  <div class="field">
    <label>腎症</label>
    <select id="nephropathy">
      <option value="">選択</option>
      <option>1期</option>
      <option>2期</option>
      <option>3期</option>
      <option>4期</option>
      <option>5期</option>
    </select>
  </div>

  <div class="field">
    <label>神経症</label>
    <select id="neuropathy">
      <option value="">選択</option>
      <option>有</option>
      <option>無</option>
    </select>
  </div>
</div>

<div class="row">
  <div class="field">
    <label>UACR mg/gCr</label>
    <input id="uacr" type="number" step="0.1">
  </div>

  <div class="field">
    <label>eGFR mL/min/1.73㎡</label>
    <input id="egfr" type="number" step="0.1">
  </div>
</div>

<div class="field">
  <label>大血管障害</label>

  <div class="vascular-options">
    <label class="vascular-card">
      <input type="checkbox" id="cad">
      <span>CAD</span>
      <small>冠動脈疾患</small>
    </label>

    <label class="vascular-card">
      <input type="checkbox" id="stroke">
      <span>脳血管障害</span>
      <small>脳梗塞・脳出血など</small>
    </label>

    <label class="vascular-card">
      <input type="checkbox" id="pad">
      <span>PAD</span>
      <small>末梢動脈疾患</small>
    </label>
  </div>
</div>

<div class="field">
  <label>注射製剤</label>
  <select id="injectable">
    <option value="">選択</option>
    <option>有：インスリン</option>
    <option>有：GLP-1</option>
    <option>有：インスリン＋GLP-1</option>
    <option>無</option>
  </select>
</div>
<div class="field"><label>治療内容</label><textarea id="treatment" placeholder="例：メトホルミン、SGLT2阻害薬、DPP-4阻害薬、インスリンなど"></textarea></div>
<div class="field"><label>登録日/診療日</label><input id="visitDate" type="date"></div>
<div class="btns"><button onclick="savePatient()">保存</button><button class="ghost" onclick="clearForm()">新規入力</button><button class="secondary" onclick="loadDemo()">デモ入力</button></div>
<p class="small">データはこのブラウザのlocalStorageに保存されます。共有・バックアップ用にCSV出力してください。</p>
</section>
<section class="card">
<h2>患者一覧</h2>
<div class="stats"><div class="stat"><b id="countAll">0</b><div class="small">総数</div></div><div class="stat"><b id="countType1">0</b><div class="small">1型</div></div><div class="stat"><b id="countInsulin">0</b><div class="small">インスリン使用</div></div><div class="stat"><b id="countComp">0</b><div class="small">合併症あり</div></div></div>
<div class="toolbar"><input id="search" placeholder="患者ID・治療内容で検索" oninput="render()"><select id="filterType" onchange="render()"><option value="">病型すべて</option><option>1型</option><option>2型</option><option>その他</option></select><select id="filterInject" onchange="render()"><option value="">注射製剤すべて</option><option>有：インスリン</option><option>有：GLP-1</option><option>有：インスリン＋GLP-1</option><option>無</option></select><button class="ok" onclick="exportCSV()">CSV出力</button><button class="ghost" onclick="backupJSON()">バックアップ</button><button class="ghost" onclick="document.getElementById('importFile').click()">復元</button><input type="file" id="importFile" accept="application/json" style="display:none" onchange="restoreJSON(event)"></div>
<div class="tablewrap"><table><thead><tr><th>操作</th><th>患者ID</th><th>性別</th><th>病型</th><th>身長</th><th>体重</th><th>BMI</th><th>sCPR</th><th>FPG</th><th>CPI</th><th>網膜症</th><th>腎症</th><th>UACR</th><th>eGFR</th><th>神経症</th><th>注射製剤</th><th>治療内容</th><th>日付</th></tr></thead><tbody id="tbody"></tbody></table></div>
</section>
</main>
<script>
const KEY='dm_specialist_registry_v3';
const fields=['patientId','sex','height','weight','dmType','scpr','fpg','retinopathy','nephropathy','uacr','egfr','neuropathy','injectable','treatment','visitDate'];
function patients(){return JSON.parse(localStorage.getItem(KEY)||'[]')}
function setPatients(v){localStorage.setItem(KEY,JSON.stringify(v))}
function val(id){return document.getElementById(id).value.trim()}
function num(id){const v=parseFloat(val(id));return isFinite(v)?v:null}
function calcBMI(){const h=num('height'),w=num('weight');return h&&w? +(w/((h/100)**2)).toFixed(1):''}
function calcCPI(){const s=num('scpr'),f=num('fpg');return s&&f? +(s*100/f).toFixed(2):''}
function updateCalc(){document.getElementById('bmiView').textContent=calcBMI()||'未計算';document.getElementById('cpiView').textContent=calcCPI()||'未計算'}
['height','weight','scpr','fpg'].forEach(id=>document.getElementById(id).addEventListener('input',updateCalc));
function savePatient(){if(!val('patientId')){alert('患者IDを入力してください');return}const p={};fields.forEach(f=>p[f]=val(f));p.bmi=calcBMI();p.cpi=calcCPI();const arr=patients();const idx=document.getElementById('editIndex').value;if(idx===''){arr.push(p)}else{arr[+idx]=p}setPatients(arr);clearForm();render()}
function clearForm(){fields.forEach(f=>document.getElementById(f).value='');document.getElementById('editIndex').value='';document.getElementById('formTitle').textContent='患者登録';document.getElementById('visitDate').valueAsDate=new Date();updateCalc()}
function editPatient(i){const p=patients()[i];fields.forEach(f=>document.getElementById(f).value=p[f]||'');document.getElementById('editIndex').value=i;document.getElementById('formTitle').textContent='患者編集';updateCalc();scrollTo(0,0)}
function delPatient(i){if(confirm('削除しますか？')){const arr=patients();arr.splice(i,1);setPatients(arr);render()}}
function matches(p){const q=val('search').toLowerCase(),t=val('filterType'),inj=val('filterInject');return (!q||JSON.stringify(p).toLowerCase().includes(q))&&(!t||p.dmType===t)&&(!inj||p.injectable===inj)}
function render(){const arr=patients();const shown=arr.map((p,i)=>({p,i})).filter(x=>matches(x.p));document.getElementById('tbody').innerHTML=shown.map(({p,i})=>`<tr><td><button class="ghost" onclick="editPatient(${i})">編集</button> <button class="danger" onclick="delPatient(${i})">削除</button></td><td>${esc(p.patientId)}</td><td>${esc(p.sex)}</td><td><span class="pill">${esc(p.dmType)}</span></td><td>${esc(p.height)}</td><td>${esc(p.weight)}</td><td>${esc(p.bmi)}</td><td>${esc(p.scpr)}</td><td>${esc(p.fpg)}</td><td>${esc(p.cpi)}</td><td>${esc(p.retinopathy)}</td><td>${esc(p.nephropathy)}</td><td>${esc(p.uacr)}</td><td>${esc(p.egfr)}</td><td>${esc(p.neuropathy)}</td><td>${esc(p.injectable)}</td><td>${esc(p.treatment)}</td><td>${esc(p.visitDate)}</td></tr>`).join('');stats(arr)}
function stats(arr){document.getElementById('countAll').textContent=arr.length;document.getElementById('countType1').textContent=arr.filter(p=>p.dmType==='1型').length;document.getElementById('countInsulin').textContent=arr.filter(p=>(p.injectable||'').includes('インスリン')).length;document.getElementById('countComp').textContent=arr.filter(p=>['単純','増殖前','増殖','凝固後'].includes(p.retinopathy)||p.nephropathy&&p.nephropathy!=='1期'||p.neuropathy==='有').length}
function exportCSV(){const headers=['患者ID','性別','身長','体重','BMI','糖尿病病型','sCPR','空腹時血糖','CPI','網膜症','腎症','UACR','eGFR','神経症','注射製剤','治療内容','登録日/診療日'];const keys=['patientId','sex','height','weight','bmi','dmType','scpr','fpg','cpi','retinopathy','nephropathy','uacr','egfr','neuropathy','injectable','treatment','visitDate'];const rows=patients().filter(matches).map(p=>keys.map(k=>csv(p[k]||'')));download('\uFEFF'+[headers.map(csv).join(','),...rows.map(r=>r.join(','))].join('\n'),'diabetes_specialist_registry.csv','text/csv')}
function backupJSON(){download(JSON.stringify(patients(),null,2),'diabetes_specialist_registry_backup.json','application/json')}
function restoreJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(!Array.isArray(data))throw 0;setPatients(data);render();alert('復元しました')}catch{alert('JSONを読み込めません')}};r.readAsText(f)}
function loadDemo(){patientId.value='DM-0001';sex.value='女性';height.value='158';weight.value='64';dmType.value='2型';scpr.value='1.4';fpg.value='132';retinopathy.value='単純';nephropathy.value='2期';uacr.value='82';egfr.value='58';neuropathy.value='無';injectable.value='有：GLP-1';treatment.value='メトホルミン、SGLT2阻害薬、GLP-1受容体作動薬';visitDate.valueAsDate=new Date();updateCalc()}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function csv(s){return '"'+String(s).replaceAll('"','""')+'"'}
function download(content,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
clearForm();render();
</script>
  <script>
const GAS_URL="https://script.google.com/macros/s/AKfycbyZoFwzn-zglWKRx0OGk3jNPtfSJ4nRHz28Xufj-873-P5Hxra_O9Yg4bSoV3G5Jtd45g/exec";

async function savePatient(data){

    const res=await fetch(GAS_URL,{
        method:"POST",
        body:JSON.stringify(data)
    });

    return await res.json();

}
</script>
</body>
</html>
